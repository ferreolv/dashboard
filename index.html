<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const TASK = new Set(["goals","word","worth","music","pushups","todo","world","birthdays"]);
const uid=()=> (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : "id-"+Date.now()+"-"+Math.random().toString(16).slice(2);

function themeVars(id, done){
  const c=COL[id]||{p:"#e6e6ea",v:"#666",d:"#444"};
  const dark = TASK.has(id) && done;
  if(dark) return { "--bg":c.v, "--ink":"#fff", "--dim":"rgba(255,255,255,0.84)", "--lbl":"rgba(255,255,255,0.92)", "--hair":"rgba(255,255,255,0.18)", "--field":"rgba(255,255,255,0.16)", "--fieldbd":"rgba(255,255,255,0.26)", "--tickbd":"rgba(255,255,255,0.65)", "--tickfill":"#fff", "--tickmark":"#1d2030", "--btnbg":"rgba(255,255,255,0.18)", "--btnbd":"rgba(255,255,255,0.30)", "--glow":`0 8px 26px -10px ${c.v}` };
  return { "--bg":c.p, "--ink":"#1d2030", "--dim":"rgba(29,32,48,0.6)", "--lbl":c.d, "--hair":"rgba(0,0,0,0.08)", "--field":"rgba(0,0,0,0.05)", "--fieldbd":"rgba(0,0,0,0.12)", "--tickbd":"rgba(29,32,48,0.36)", "--tickfill":"#1d2030", "--tickmark":"#fff", "--btnbg":"rgba(0,0,0,0.06)", "--btnbd":"rgba(0,0,0,0.13)", "--glow":"0 0 0 0 transparent" };
}

/* localStorage */
const load=(k,fb)=>{ try{ const v=localStorage.getItem("fefe_"+k); return v==null?fb:JSON.parse(v); }catch{ return fb; } };
const save=(k,val)=>{ try{ localStorage.setItem("fefe_"+k, JSON.stringify(val)); }catch(e){} };
const getKey=()=> (localStorage.getItem("fefe_apiKey")||"").trim();

/* dates */
const pad=n=>String(n).padStart(2,"0");
const dateKey=(d=new Date())=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
function addDays(key,n){ const [y,m,d]=key.split("-").map(Number); const dt=new Date(y,m-1,d); dt.setDate(dt.getDate()+n); return dateKey(dt); }
const todayKey=dateKey();

/* Claude API (browser key) */
function extractJSON(text){ if(!text) return null; let t=text.replace(/```json|```/g,"").trim(); const s=[t.indexOf("{"),t.indexOf("[")].filter(i=>i>=0); const a=s.length?Math.min(...s):-1; const b=Math.max(t.lastIndexOf("}"),t.lastIndexOf("]")); if(a===-1||b===-1) return null; try{ return JSON.parse(t.slice(a,b+1)); }catch{ return null; } }
function clean(s){ if(s==null) return ""; return String(s)
  .replace(/【[^】]*】/g,"").replace(/\[[0-9]+\]/g,"").replace(/\((?:https?:[^)]+)\)/g,"")
  .replace(/https?:\/\/\S+/g,"").replace(/[*_`#>\\]+/g,"").replace(/\s+([.,;:!?])/g,"$1")
  .replace(/\s{2,}/g," ").trim(); }
async function callClaude(system,user,opts={}){
  const key=getKey(); if(!key) throw new Error("no-key");
  const body={ model:"claude-sonnet-4-6", max_tokens:opts.max||1000, system, messages:[{role:"user",content:user}] };
  if(opts.web) body.tools=[{type:"web_search_20250305", name:"web_search"}];
  const res=await fetch("https://api.anthropic.com/v1/messages",{ method:"POST",
    headers:{ "content-type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true" },
    body:JSON.stringify(body) });
  if(!res.ok) throw new Error("API "+res.status);
  const data=await res.json();
  return (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
}
const genWord=(avoid)=>callClaude("You output ONLY valid minified JSON, no markdown.",
  `One moderately uncommon but useful English word a curious bilingual reader probably doesn't know, with its French equivalent and a quick synonym quiz. Avoid: ${avoid.join(", ")||"none"}. Shape:{"term_en":"","ipa":"","pos":"","def_en":"","term_fr":"","def_fr":"","quiz":{"options":["","","",""],"answer":0}}. The 4 quiz options are single words; exactly one (index "answer") is the closest synonym. Defs under 12 words.`).then(extractJSON);
const genMusic=(avoid)=>callClaude("You output ONLY valid minified JSON, no markdown.",
  `Recommend ONE song that is critically or technically excellent yet UNDERRATED — something most people don't know but that a musicologist or serious critic would admire (craft, innovation, influence, musicianship). Deliberately vary widely across genres, eras and cultures every time (e.g. modal jazz, West African highlife, ambient, post-punk, bossa nova, baroque, experimental electronic, Appalachian folk, dub). Real, findable track. Avoid anything mainstream or famous, and do NOT repeat: ${avoid.join(" | ")||"none"}. Shape:{"title":"","artist":"","year":"","genre":"","why":""}. "genre" is the specific style; "why" (max 18 words) says what makes it special and why it's overlooked.`).then(extractJSON);
const genLesson=()=>callClaude("You output ONLY valid minified JSON, no markdown.",
  `Write a short daily LESSON in story format on something genuinely worth knowing (history, science, culture, ideas, a notable person/event) — vivid, concrete, NOT trivia. Exactly 2 short paragraphs (~110 words total) separated by \\n\\n, with enough detail to be memorable. Then a one-line memorable insight and a 2-question quiz. Shape:{"title":"","category":"","story":"","insight":"","quiz":[{"prompt":"","options":["","",""],"answer":0,"explain":""},{"prompt":"","options":["","",""],"answer":0,"explain":""}]}. Each "explain" one sentence; "answer" is the correct option index.`, {max:1300}).then(extractJSON);
async function genWorld(){
  const out=await callClaude("You output ONLY a valid JSON array, no markdown.",
    `Today's 5 most important world developments. For each: "headline" (max 9 words) and a substantive "summary" of 2-3 sentences explaining what happened AND why it matters. Write plain prose only — absolutely NO markdown, NO asterisks, NO citation markers or footnote numbers like [1], NO source names in brackets, NO URLs, NO special symbols. Neutral and clear. JSON array of {"headline":"","summary":""}.`, {web:true, max:1600});
  const arr=extractJSON(out); return Array.isArray(arr)?arr:null;
}

/* weather (Open-Meteo, no key) */
const WMO={0:["Clear","☀️"],1:["Mainly clear","🌤️"],2:["Partly cloudy","⛅"],3:["Overcast","☁️"],45:["Fog","🌫️"],48:["Fog","🌫️"],51:["Light drizzle","🌦️"],53:["Drizzle","🌦️"],55:["Drizzle","🌦️"],61:["Light rain","🌧️"],63:["Rain","🌧️"],65:["Heavy rain","🌧️"],71:["Light snow","🌨️"],73:["Snow","🌨️"],75:["Snow","🌨️"],80:["Showers","🌦️"],81:["Showers","🌧️"],82:["Heavy showers","⛈️"],95:["Storm","⛈️"],96:["Storm","⛈️"],99:["Storm","⛈️"]};
async function fetchWeather(){
  const r=await fetch("https://api.open-meteo.com/v1/forecast?latitude=-33.8688&longitude=151.2093&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=1");
  const d=await r.json();
  return { temp:Math.round(d.current.temperature_2m), code:d.current.weather_code, hi:Math.round(d.daily.temperature_2m_max[0]), lo:Math.round(d.daily.temperature_2m_min[0]), at:Date.now() };
}

/* iCloud / vCard (.vcf) birthday import — fully local, no network */
function parseVcf(text){
  const out=[]; const blocks=text.split(/BEGIN:VCARD/i);
  for(const blk of blocks){
    if(!/BDAY/i.test(blk)) continue;
    const nM=blk.match(/(?:^|\n)FN[^:\n]*:([^\r\n]+)/i);
    const bM=blk.match(/(?:^|\n)BDAY[^:\n]*:([^\r\n]+)/i);
    if(!nM||!bM) continue;
    const name=nM[1].trim();
    const val=bM[1].split("T")[0].trim();
    const lead=val.startsWith("--");
    const digits=val.replace(/[^0-9]/g,"");
    let mo,da;
    if(lead && digits.length>=4){ mo=+digits.slice(0,2); da=+digits.slice(2,4); }
    else if(digits.length>=8){ mo=+digits.slice(4,6); da=+digits.slice(6,8); }
    else if(digits.length===4){ mo=+digits.slice(0,2); da=+digits.slice(2,4); }
    else continue;
    if(name && mo>=1 && mo<=12 && da>=1 && da<=31) out.push({name, month:mo, day:da});
  }
  return out;
}

/* seeds */
const SEED={

};

/* spaced repetition */
const INTERVALS=[1,3,7,16,35,90];
const reschedule=(f,ok)=>{ const level=ok?Math.min(f.level+1,INTERVALS.length-1):Math.max(0,f.level-1); return {...f, level, nextReview:addDays(todayKey,INTERVALS[level])}; };
function streakOf(log,id){ const dt=!!(log[todayKey]&&log[todayKey][id]); let s=0,start=dt?0:1; for(let d=start;d<400;d++){ const k=addDays(todayKey,-d); if(log[k]&&log[k][id]) s++; else break; } return s; }
function weekCount(log,id){ let c=0; for(let d=0;d<7;d++){ const k=addDays(todayKey,-d); if(log[k]&&log[k][id]) c++; } return c; }

/* atoms */
const Readout=({children})=> <span className="ro">{children}</span>;
const IconBtn=({title,onClick,children,spin})=> <button title={title} onClick={onClick} className="iconbtn" style={{animation:spin?"spin .9s linear infinite":"none"}}>{children}</button>;
const Note=({children})=> <p className="muted" style={{fontSize:12.5,margin:"6px 2px",lineHeight:1.45}}>{children}</p>;

function Quiz({prompt,options,answer,explain,onDone}){
  const [sel,setSel]=useState(null); const done=sel!==null;
  return (
    <div>
      {prompt && <p className="qprompt">{prompt}</p>}
      <div className="qopts">
        {options.map((o,i)=>{ let cls="qopt"; if(done){ if(i===answer)cls+=" correct"; else if(i===sel)cls+=" wrong"; else cls+=" dim"; }
          return <button key={i} className={cls} disabled={done} onClick={()=>{ setSel(i); onDone&&onDone(i===answer); }}>{o}</button>; })}
      </div>
      {done && explain && <p className="qexplain">{explain}</p>}
    </div>
  );
}

/* cards */
function WordCard({word,sample,onLearned}){
  if(!word) return <Note>Loading…</Note>;
  return (
    <div>
      <div style={{display:"flex",alignItems:"baseline",gap:8,flexWrap:"wrap"}}>
        <span style={{fontSize:21,fontWeight:700}}>{word.term_en}</span>
        {word.pos && <span className="lbl">{word.pos}</span>}
      </div>
      {word.ipa && <span className="muted" style={{fontSize:11.5}}>{word.ipa}</span>}
      <p style={{fontSize:13,margin:"5px 0 0",lineHeight:1.35}}>{word.def_en}</p>
      <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid var(--hair)"}}>
        <span style={{fontSize:14.5,fontWeight:700}}>{word.term_fr}</span>
        <span className="muted" style={{fontSize:12.5}}> — {word.def_fr}</span>
      </div>
      {word.quiz && <Quiz prompt="Quiz · closest word?" options={word.quiz.options} answer={word.quiz.answer} explain={`Closest synonym for “${word.term_en}”.`} onDone={()=>onLearned(word)} />}
      {sample && <p className="samplehint">Sample — add a key in ⚙ for a fresh word daily.</p>}
    </div>
  );
}
function LessonCard({lesson,sample,onLearned}){
  const [n,setN]=useState(0);
  useEffect(()=>{ setN(0); },[lesson && lesson.title]);
  if(!lesson) return <Note>Loading…</Note>;
  const qs=lesson.quiz||[];
  const mark=()=>{ setN(v=>{ const nv=v+1; if(nv>=qs.length) onLearned(lesson); return nv; }); };
  return (
    <div>
      <div style={{fontSize:16,fontWeight:700,lineHeight:1.2,marginBottom:2}}>{lesson.title}</div>
      {lesson.category && <span className="lbl">{lesson.category}</span>}
      <div className="story" style={{marginTop:8}}>{(lesson.story||"").split("\n\n").map((p,i)=><p key={i}>{p}</p>)}</div>
      {lesson.insight && <div className="insight">💡 {lesson.insight}</div>}
      {qs.map((q,i)=><Quiz key={i} prompt={q.prompt} options={q.options} answer={q.answer} explain={q.explain} onDone={mark} />)}
      {sample && <p className="samplehint">Sample lesson — add a key in ⚙ for a new one daily.</p>}
    </div>
  );
}
function WeatherCard({data,busy}){
  if(busy && !data) return <Note>Checking Sydney skies…</Note>;
  if(!data) return <Note>Weather unavailable — tap ↻.</Note>;
  const [label,emoji]=WMO[data.code]||["—","🌡️"];
  return (
    <div style={{display:"flex",alignItems:"center",gap:14}}>

      <div>
        <div style={{display:"flex",alignItems:"baseline",gap:8}}><span className="wbig">{data.temp}°</span><span className="muted" style={{fontSize:13}}>{label}</span></div>
        <div className="muted" style={{fontSize:12,marginTop:2}}>Sydney · H {data.hi}° · L {data.lo}°</div>

/* sizing */
const ROW=112, GAP=13;
const DEFSIZE={ goals:{c:3,r:2}, word:{c:2,r:2}, worth:{c:4,r:3}, music:{c:2,r:2}, weather:{c:2,r:1}, pushups:{c:2,r:1}, todo:{c:2,r:2}, upcoming:{c:2,r:2}, world:{c:4,r:2}, recall:{c:2,r:2}, weekly:{c:2,r:2}, birthdays:{c:2,r:1} };
const ALL=Object.keys(DEFSIZE);

function Tile({id,label,done,size,cols,edit,lifted,topright,onMoveStart,onResizeStart,children}){
  const t=themeVars(id,done);
  const span={ gridColumn:`span ${Math.min(size.c,cols)}`, gridRow:`span ${size.r}` };
  return (
    <section data-tileid={id} className={"tile enter"+(edit?" editing":"")+(lifted?" lift":"")} style={{...t,...span}}>
      <div className="tilehead"><span style={{display:"flex",alignItems:"center",gap:7}}><span className="ldot"/><span className="lbl">{label}</span></span></div>
      {topright && !edit && <div className="topright">{topright}</div>}
      <div className={"tbody"}><div className={"content"+(edit?" locked":"")}>{children}</div></div>
      {edit && <>
        <div className="draglayer" onPointerDown={(e)=>onMoveStart(e,id)} />
        <div className="sizebadge">{Math.min(size.c,cols)}×{size.r}</div>
        <div className="resizeH" onPointerDown={(e)=>onResizeStart(e,id)} />
      </>}
    </section>
  );
}

function App(){
  const [edit,setEdit]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [cols,setCols]=useState(()=>{ const w=window.innerWidth; return w>=1000?6:w>=640?4:2; });
  const [order,setOrder]=useState(()=>{ const o=load("widgetOrder",ALL); const s=Array.isArray(o)?o.filter(x=>ALL.includes(x)):[]; return [...s,...ALL.filter(x=>!s.includes(x))]; });
  const [sizes,setSizes]=useState(()=>({...DEFSIZE, ...load("sizes",{})}));
  const [lifted,setLifted]=useState(null);

  const [goalsLog,setGoalsLog]=useState(()=>load("goalsLog",{}));
  const [todos,setTodos]=useState(()=>load("todos",[]));
  const [habits,setHabits]=useState(()=>load("habits",[{id:uid(),name:"Sport"},{id:uid(),name:"Read"}]));
  const [habitLog,setHabitLog]=useState(()=>load("habitLog",{}));
  const [ritualLog,setRitualLog]=useState(()=>load("ritualLog",{}));
  const [pushLog,setPushLog]=useState(()=>load("pushLog",{}));
  const [events,setEvents]=useState(()=>load("events",[]));
  const [birthdays,setBirthdays]=useState(()=>load("birthdays",[]));
  const [recallList,setRecallList]=useState(()=>load("recall",[]));
  const [keyField,setKeyField]=useState(()=>getKey());

  const [daily,setDaily]=useState(()=>load("daily:"+todayKey, null));
  const haveKey=!!getKey();
  const view=daily||SEED;
  const sampleMode=!daily;
  const [weather,setWeather]=useState(()=>load("weather",null));
  const [busy,setBusy]=useState({word:false,worth:false,music:false,world:false,weather:false});
  const [weekly,setWeekly]=useState(null); const [showWeekly,setShowWeekly]=useState(false);
  const [now,setNow]=useState(new Date());
  useEffect(()=>{ const t=setInterval(()=>setNow(new Date()),15000); return ()=>clearInterval(t); },[]);
  useEffect(()=>{ const onR=()=>{ const w=window.innerWidth; setCols(w>=1000?6:w>=640?4:2); }; window.addEventListener("resize",onR); return ()=>window.removeEventListener("resize",onR); },[]);

  const goals=goalsLog[todayKey]||[]; const rToday=ritualLog[todayKey]||{}; const hToday=habitLog[todayKey]||{}; const pToday=pushLog[todayKey]||0;

  const setGoals=a=>{ const m={...goalsLog,[todayKey]:a}; setGoalsLog(m); save("goalsLog",m); };
  const persistTodos=v=>{ setTodos(v); save("todos",v); };
  const persistHabits=v=>{ setHabits(v); save("habits",v); };
  const persistEvents=v=>{ setEvents(v); save("events",v); };
  const persistBirthdays=v=>{ setBirthdays(v); save("birthdays",v); };
  const persistRecall=v=>{ setRecallList(v); save("recall",v); };
  const toggleHabit=id=>{ const day={...hToday,[id]:!hToday[id]}; const m={...habitLog,[todayKey]:day}; setHabitLog(m); save("habitLog",m); };
  const setRitual=k=>{ if(rToday[k]) return; const day={...rToday,[k]:true}; const m={...ritualLog,[todayKey]:day}; setRitualLog(m); save("ritualLog",m); };
  const addPush=n=>{ const v=Math.max(0,pToday+n); const m={...pushLog,[todayKey]:v}; setPushLog(m); save("pushLog",m); };
  const setPushExact=n=>{ const v=Math.max(0,n|0); const m={...pushLog,[todayKey]:v}; setPushLog(m); save("pushLog",m); };
  const writeDaily=useCallback(patch=>{ setDaily(p=>{ const base=p||{...SEED}; const next={...base,...patch}; save("daily:"+todayKey,next); return next; }); },[]);

  const goSettings=()=>setShowSettings(true);
  const refreshWord=async()=>{ if(!getKey())return goSettings(); setBusy(b=>({...b,word:true})); try{ const h=load("wordHistory",[]); const w=await genWord(h.slice(-12)); if(w){ writeDaily({word:w}); save("wordHistory",[...h,w.term_en].slice(-40)); } }catch(e){ alert("Word: "+e.message);} setBusy(b=>({...b,word:false})); };
  const refreshMusic=async()=>{ if(!getKey())return goSettings(); setBusy(b=>({...b,music:true})); try{ const h=load("musicHistory",[]); const m=await genMusic(h.slice(-30)); if(m){ writeDaily({music:m}); save("musicHistory",[...h,`${m.title} — ${m.artist}`].slice(-80)); } }catch(e){ alert("Music: "+e.message);} setBusy(b=>({...b,music:false})); };
  const refreshLesson=async()=>{ if(!getKey())return goSettings(); setBusy(b=>({...b,worth:true})); try{ const l=await genLesson(); if(l) writeDaily({worth:l}); }catch(e){ alert("Lesson: "+e.message);} setBusy(b=>({...b,worth:false})); };
  const refreshWorld=async()=>{ if(!getKey())return goSettings(); setBusy(b=>({...b,world:true})); try{ const n=await genWorld(); if(n) writeDaily({world:n}); }catch(e){ alert("World: "+e.message);} setBusy(b=>({...b,world:false})); };
  const refreshWeather=async()=>{ setBusy(b=>({...b,weather:true})); try{ const w=await fetchWeather(); setWeather(w); save("weather",w); }catch(e){} setBusy(b=>({...b,weather:false})); };

  useEffect(()=>{ if(!weather || (Date.now()-(weather.at||0))>3*3600*1000) refreshWeather(); /* eslint-disable-next-line */ },[]);
  useEffect(()=>{ if(!getKey()) return; if(load("daily:"+todayKey,null)) return;
    (async()=>{ setBusy(b=>({...b,word:true,worth:true,music:true,world:true}));
      try{ const [w,l,m,n]=await Promise.all([ genWord(load("wordHistory",[]).slice(-12)), genLesson(), genMusic(load("musicHistory",[]).slice(-30)), genWorld() ]);
        const next={ word:w||SEED.word, worth:l||SEED.worth, music:m||SEED.music, world:n||SEED.world }; setDaily(next); save("daily:"+todayKey,next);
        if(w) save("wordHistory",[...load("wordHistory",[]),w.term_en].slice(-40)); if(m) save("musicHistory",[...load("musicHistory",[]),`${m.title} — ${m.artist}`].slice(-60));
      }catch(e){} setBusy(b=>({...b,word:false,worth:false,music:false,world:false})); })();
  /* eslint-disable-next-line */ },[]);

  /* recall scheduling */
  const learnWord=w=>{ setRitual("word"); if(w&&w.quiz && !recallList.some(x=>x.type==="word"&&x.addedOn===todayKey)) persistRecall([...recallList,{ id:uid(), type:"word", addedOn:todayKey, level:0, nextReview:addDays(todayKey,INTERVALS[0]), title:"Word · "+w.term_en, quiz:{ prompt:`Closest word to “${w.term_en}”?`, options:w.quiz.options, answer:w.quiz.answer, explain:`“${w.term_en}” — ${w.def_en}.` } }]); };
  const learnLesson=l=>{ setRitual("worth"); if(l&&l.quiz&&l.quiz[0] && !recallList.some(x=>x.type==="lesson"&&x.addedOn===todayKey)){ const q=l.quiz[0]; persistRecall([...recallList,{ id:uid(), type:"lesson", addedOn:todayKey, level:0, nextReview:addDays(todayKey,INTERVALS[0]), title:l.title, quiz:{ prompt:q.prompt, options:q.options, answer:q.answer, explain:q.explain } }]); } };
  const gradeRecall=(item,ok)=>{ persistRecall(recallList.map(x=>x.id===item.id?reschedule(x,ok):x)); };

  /* ---- drag engine (move + resize), pointer-based, touch+mouse ---- */
  const gridRef=useRef(null);
  const orderRef=useRef(order); useEffect(()=>{orderRef.current=order;},[order]);
  const sizesRef=useRef(sizes); useEffect(()=>{sizesRef.current=sizes;},[sizes]);
  const drag=useRef(null);
  const rafPending=useRef(false);

  const cellW=()=>{ const g=gridRef.current; if(!g) return 120; return (g.clientWidth-GAP*(cols-1))/cols; };

  const onMoveStart=(e,id)=>{
    e.preventDefault();
    drag.current={ type:"move", id, x:e.clientX, y:e.clientY };
    setLifted(id); document.body.classList.add("dragging");
    window.addEventListener("pointermove",onPointerMove,{passive:false});
    window.addEventListener("pointerup",onPointerUp,{once:true});
    window.addEventListener("pointercancel",onPointerUp,{once:true});
  };
  const onResizeStart=(e,id)=>{
    e.preventDefault(); e.stopPropagation();
    const s=sizesRef.current[id]||{c:2,r:1};
    drag.current={ type:"resize", id, x:e.clientX, y:e.clientY, c0:Math.min(s.c,cols), r0:s.r };
    document.body.classList.add("dragging");
    window.addEventListener("pointermove",onPointerMove,{passive:false});
    window.addEventListener("pointerup",onPointerUp,{once:true});
    window.addEventListener("pointercancel",onPointerUp,{once:true});
  };
  const onPointerMove=(e)=>{
    if(!drag.current) return; e.preventDefault();
    const d=drag.current;
    if(d.type==="move"){
      if(rafPending.current) return; rafPending.current=true;
      requestAnimationFrame(()=>{
        rafPending.current=false;
        const el=document.elementFromPoint(e.clientX,e.clientY);
        const t=el&&el.closest&&el.closest("[data-tileid]");
        const over=t&&t.getAttribute("data-tileid");
        if(over && over!==d.id){
          const cur=[...orderRef.current]; const from=cur.indexOf(d.id); const to=cur.indexOf(over);
          if(from>-1&&to>-1){ cur.splice(from,1); cur.splice(to,0,d.id); orderRef.current=cur; setOrder(cur); }
        }
      });
    } else {
      const cw=cellW();
      const dc=Math.round((e.clientX-d.x)/(cw+GAP));
      const dr=Math.round((e.clientY-d.y)/(ROW+GAP));
      const nc=Math.max(1,Math.min(cols, d.c0+dc));
      const nr=Math.max(1,Math.min(6, d.r0+dr));
      const cur=sizesRef.current[d.id]||{c:2,r:1};
      if(cur.c!==nc||cur.r!==nr){ const next={...sizesRef.current,[d.id]:{c:nc,r:nr}}; sizesRef.current=next; setSizes(next); }
    }
  };
  const onPointerUp=()=>{
    window.removeEventListener("pointermove",onPointerMove);
    document.body.classList.remove("dragging"); setLifted(null);
    if(drag.current){ if(drag.current.type==="move") save("widgetOrder",orderRef.current); else save("sizes",sizesRef.current); }
    drag.current=null;
  };

  const saveSettings=()=>{ localStorage.setItem("fefe_apiKey",keyField.trim()); try{ localStorage.removeItem("fefe_daily:"+todayKey);}catch(e){} location.reload(); };
  const resetLayout=()=>{ save("widgetOrder",ALL); save("sizes",DEFSIZE); setOrder(ALL); setSizes(DEFSIZE); };
  const importVcf=(file)=>{ if(!file) return; const r=new FileReader();
    r.onload=()=>{ try{
      const list=parseVcf(String(r.result));
      const manual=birthdays.filter(b=>b.source!=="vcf");
      const seen=new Set(manual.map(b=>b.name+"|"+b.month+"|"+b.day));
      const add=list.filter(b=>{ const k=b.name+"|"+b.month+"|"+b.day; if(seen.has(k))return false; seen.add(k); return true; }).map(b=>({id:uid(),source:"vcf",...b}));
      persistBirthdays([...manual,...add]);
      alert(`Imported ${add.length} birthday${add.length===1?"":"s"} from your contacts.`+(list.length===0?"\n\nNo birthdays found in that file — make sure your contacts have a birthday set before exporting.":""));
    }catch(e){ alert("Couldn't read that file: "+e.message); } };
    r.readAsText(file); };

  const buildWeekly=()=>{ const days14=[]; for(let i=13;i>=0;i--) days14.push(addDays(todayKey,-i));
    const push=days14.map(k=>pushLog[k]||0); const pushTotal=push.reduce((a,b)=>a+b,0); const pushAvg=Math.round(pushTotal/14);
    const cutoff=addDays(todayKey,-6);
    const tasksDone=todos.filter(t=>t.done&&t.completedAt&&t.completedAt>=cutoff).length;
    const learned=recallList.filter(f=>f.addedOn>=cutoff).length;
    let goalsDone=0; for(let i=0;i<7;i++){ const k=addDays(todayKey,-i); (goalsLog[k]||[]).forEach(g=>{ if(g.done) goalsDone++; }); }
    setWeekly({ push, pushTotal, pushAvg, tasksDone, learned, goalsDone }); };
  const openWeekly=()=>{ if(!showWeekly) buildWeekly(); setShowWeekly(s=>!s); };

  const dueFacts=recallList.filter(f=>f.nextReview<=todayKey && f.addedOn!==todayKey).slice(0,6);
  const todayBdays=birthdays.filter(b=>Number(b.month)===now.getMonth()+1 && Number(b.day)===now.getDate());
  const greeting=now.getHours()<12?"Bonjour":now.getHours()<18?"Bon aprèm":"Bonsoir";
  const goalsLit=goals.length>0 && goals.every(g=>g.done);
  const habitsLit=habits.length>0 && habits.every(h=>hToday[h.id]);
  const todoLit=todos.length>0 && todos.every(t=>t.done);
  const litTotal=4 + goals.length;
  const litDone=(rToday.word?1:0)+(rToday.worth?1:0)+(rToday.music?1:0)+(rToday.world?1:0)+goals.filter(g=>g.done).length;
  const pctLit=litTotal?Math.round(litDone/litTotal*100):0;
  const upcoming=[...events].filter(e=>e.date>=todayKey).sort((a,b)=>a.date.localeCompare(b.date)||(a.time||"").localeCompare(b.time||""));
  const dayLabel=k=>{ if(k===todayKey)return"Today"; if(k===addDays(todayKey,1))return"Tomorrow"; const [y,m,d]=k.split("-").map(Number); return new Date(y,m-1,d).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"}); };
  const sz=id=>sizes[id]||DEFSIZE[id]||{c:2,r:1};
  const T=(id,label,done,topright,children)=> <Tile key={id} id={id} label={label} done={done} size={sz(id)} cols={cols} edit={edit} lifted={lifted===id} topright={topright} onMoveStart={onMoveStart} onResizeStart={onResizeStart}>{children}</Tile>;

  const widgets={
    goals: T("goals","Today's goals",goalsLit,null,<>
      <GoalInput onAdd={text=>setGoals([...goals,{id:uid(),text,done:false}])} />
      <div style={{marginTop:6}}>
        {goals.length===0 && <Note>What would make today a win? Add a goal or two.</Note>}
        {goals.map(g=>(<div key={g.id} className="trow">
          <button className={"tick"+(g.done?" on":"")} onClick={()=>setGoals(goals.map(x=>x.id===g.id?{...x,done:!x.done}:x))}>{g.done?"✓":""}</button>
          <span style={{flex:1,textDecoration:g.done?"line-through":"none",opacity:g.done?0.7:1,fontSize:14}}>{g.text}</span>
          <button className="del" onClick={()=>setGoals(goals.filter(x=>x.id!==g.id))}>×</button>
        </div>))}
      </div></>),
    word: T("word","Mot du jour",!!rToday.word, <IconBtn title="Another word" onClick={refreshWord} spin={busy.word}>↻</IconBtn>,
      <WordCard word={view.word} sample={sampleMode} onLearned={learnWord} />),
    worth: T("worth","Worth knowing · lesson",!!rToday.worth, <IconBtn title="Another lesson" onClick={refreshLesson} spin={busy.worth}>↻</IconBtn>,
      <LessonCard lesson={view.worth} sample={sampleMode} onLearned={learnLesson} />),
    music: T("music","One song",!!rToday.music, <IconBtn title="Another pick" onClick={refreshMusic} spin={busy.music}>↻</IconBtn>,
      view.music ? (<div>
        <div style={{fontSize:17,fontWeight:700,lineHeight:1.2}}>{view.music.title}</div>
        <div style={{fontSize:13,marginTop:1,opacity:0.9}}>{view.music.artist}{view.music.year?` · ${view.music.year}`:""}</div>
        {view.music.genre && <div style={{marginTop:5}}><span className="lbl">{view.music.genre}</span></div>}
        <p className="muted" style={{fontSize:12,margin:"7px 0 9px",lineHeight:1.35}}>{view.music.why}</p>
        <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
          <a className="pill" target="_blank" rel="noreferrer" href={`https://music.apple.com/search?term=${encodeURIComponent(view.music.title+" "+view.music.artist)}`}>Apple Music ↗</a>
          <button className={"mark"+(rToday.music?" on":"")} onClick={()=>setRitual("music")}><span className={"tick sm"+(rToday.music?" on":"")}>{rToday.music?"✓":""}</span>{rToday.music?"Heard":"Listened"}</button>
        </div>
        {sampleMode && <p className="samplehint">Sample — add a key in ⚙ for a fresh discovery daily.</p>}
      </div>) : <Note>Loading…</Note>),
    weather: T("weather","Weather · Sydney",false, <IconBtn title="Refresh" onClick={refreshWeather} spin={busy.weather}>↻</IconBtn>,
      <WeatherCard data={weather} busy={busy.weather} />),
    pushups: T("pushups","Push-ups · today",pToday>0,null,
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <span style={{font:"800 30px/1 'Plus Jakarta Sans',sans-serif"}}>{pToday}</span>
        <div style={{display:"flex",gap:6,flex:1}}>
          <button className="puBtn" onClick={()=>addPush(5)}>+5</button>
          <button className="puBtn" onClick={()=>addPush(10)}>+10</button>
          <button className="puBtn" onClick={()=>addPush(20)}>+20</button>
          <button className="puBtn" style={{flex:"none",width:34}} onClick={()=>setPushExact(0)}>↺</button>
        </div>
      </div>),
    todo: T("todo","To-do",todoLit,null,<>
      <TodoInput onAdd={text=>persistTodos([...todos,{id:uid(),text,done:false}])} />
      <div style={{marginTop:5}}>
        {todos.length===0 && <Note>Clear list. Add the next thing.</Note>}
        {todos.map(t=>(<div key={t.id} className="trow">
          <button className={"tick"+(t.done?" on":"")} onClick={()=>persistTodos(todos.map(x=>x.id===t.id?{...x,done:!x.done,completedAt:!x.done?todayKey:null}:x))}>{t.done?"✓":""}</button>
          <span style={{flex:1,textDecoration:t.done?"line-through":"none",opacity:t.done?0.7:1,fontSize:13.5}}>{t.text}</span>
          <button className="del" onClick={()=>persistTodos(todos.filter(x=>x.id!==t.id))}>×</button>
        </div>))}
      </div></>),
    upcoming: T("upcoming","Upcoming",false,null,<>
      <EventInput onAdd={ev=>persistEvents([...events,{id:uid(),...ev}])} />
      <div style={{marginTop:8}}>
        {upcoming.length===0 && <Note>Add appointments and deadlines with a date.</Note>}
        {Object.entries(upcoming.reduce((g,e)=>{ (g[e.date]=g[e.date]||[]).push(e); return g; },{})).map(([d,list])=>(
          <div key={d} style={{marginBottom:9}}>
            <span className="lbl" style={d===todayKey?{color:"var(--ink)"}:null}>{dayLabel(d)}</span>
            <div style={{marginTop:4,display:"flex",flexDirection:"column",gap:4}}>
              {list.map(e=>(<div key={e.id} style={{display:"flex",gap:8,alignItems:"baseline"}}>
                <span className="muted" style={{font:"700 10.5px/1.3 'Space Mono',monospace",minWidth:42}}>{e.time||"—"}</span>
                <span style={{flex:1,fontSize:13,lineHeight:1.3}}>{e.title}</span>
                <button className="del" onClick={()=>persistEvents(events.filter(x=>x.id!==e.id))}>×</button>
              </div>))}
            </div>
          </div>))}
      </div></>),
    world: T("world","World briefing · today",!!rToday.world, <IconBtn title="Refresh briefing" onClick={refreshWorld} spin={busy.world}>↻</IconBtn>,<>
      {busy.world && <Note>Writing today's briefing…</Note>}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {(view.world||[]).map((n,i)=>(<div key={i}>
          <div style={{fontSize:14.5,fontWeight:700,lineHeight:1.25}}>{clean(n.headline)}</div>
          <div className="muted" style={{fontSize:12.8,lineHeight:1.5,marginTop:3}}>{clean(n.summary)}</div>
        </div>))}
      </div>
      {(view.world&&view.world.length>0&&!busy.world) && <div style={{marginTop:11}}><button className={"mark"+(rToday.world?" on":"")} onClick={()=>setRitual("world")}><span className={"tick sm"+(rToday.world?" on":"")}>{rToday.world?"✓":""}</span>{rToday.world?"Read":"Mark read"}</button></div>}</>),
    recall: T("recall",`Recall · ${dueFacts.length} due`,false,null,
      dueFacts.length===0 ? <Note>Nothing due. Words and lessons you finish return here as quick quizzes on a 1/3/7/16-day schedule, so they stick.</Note>
      : <div>{dueFacts.map(item=>(<div key={item.id} className="reviewItem">
          <p className="rtitle">{item.title}</p>
          <Quiz prompt={item.quiz.prompt} options={item.quiz.options} answer={item.quiz.answer} explain={item.quiz.explain} onDone={ok=>gradeRecall(item,ok)} />
        </div>))}</div>),
    weekly: T("weekly","Weekly review",false,null,
      !showWeekly ? (<><Note>Push-up progress over two weeks, plus what you finished this week.</Note><button className="pill" onClick={openWeekly}>See review →</button></>)
      : weekly ? (<div style={{display:"flex",flexDirection:"column",gap:13}}>
          <div><Readout>Push-ups · 14 days · {weekly.pushTotal} total · ~{weekly.pushAvg}/day</Readout>
            <LineChart values={weekly.push} />
            <div style={{display:"flex",justifyContent:"space-between",marginTop:1}}><span className="barday">2 weeks ago</span><span className="barday">1 week</span><span className="barday">today</span></div>
          </div>
          <div style={{display:"flex",gap:16,flexWrap:"wrap"}}><div><div className="statn">{weekly.goalsDone}</div><Readout>goals hit</Readout></div><div><div className="statn">{weekly.tasksDone}</div><Readout>tasks done</Readout></div><div><div className="statn">{weekly.learned}</div><Readout>learned</Readout></div></div>
          <button className="link" onClick={()=>setShowWeekly(false)} style={{alignSelf:"flex-start"}}>Hide</button>
        </div>) : <Note>Crunching your weeks…</Note>),
    birthdays: T("birthdays","Birthdays",todayBdays.length>0,null,
      <BirthdaysCard birthdays={birthdays} today={todayBdays}
        onAdd={b=>persistBirthdays([...birthdays,{id:uid(),...b}])}
        onRemove={id=>persistBirthdays(birthdays.filter(x=>x.id!==id))}
        onImport={importVcf} />),
  };

  return (
    <div className="wrap">
      <header className="hero">
        <div className="heroL">
          <div className="clock">{pad(now.getHours())}:{pad(now.getMinutes())}</div>
          <div className="heroMeta">
            <span className="greet">{greeting}, Fefe.</span>
            <span className="subro">{now.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"}).toUpperCase()} · {pctLit===100?"🎉 FULLY LIT":pctLit+"% LIT"}</span>
          </div>
        </div>
        <div className="heroR">
          <button className="hbtn" onClick={()=>setShowSettings(s=>!s)}>⚙ Settings</button>
          <button className={"hbtn"+(edit?" active":"")} onClick={()=>setEdit(a=>!a)}>{edit?"✓ Done":"Arrange"}</button>
        </div>
      </header>

      {showSettings && (
        <div className="settings">
          <h3>Settings</h3>
          <p>Everything here is stored only in this browser.</p>
          <div className="lab">Anthropic API key — powers the word, lesson, song & world tiles</div>
          <div className="srow"><input className="sinput" type="password" placeholder="sk-ant-…" value={keyField} onChange={e=>setKeyField(e.target.value)} /></div>
          <p className="hint" style={{marginTop:12}}>Birthdays: export your contacts as a vCard (.vcf), then use “All birthdays & import” on the Birthdays tile.</p>
          <div className="srow" style={{marginTop:14}}>
            <button className="savebtn" onClick={saveSettings}>Save & refresh</button>
            <button className="ghostbtn" onClick={resetLayout}>Reset layout</button>
            <button className="ghostbtn" onClick={()=>setShowSettings(false)}>Close</button>
          </div>
        </div>
      )}

      {edit && <div className="edithint">✦ Drag a tile to move it · drag the bottom-right corner to resize · tap “Done” when finished.</div>}

      <div className="grid" ref={gridRef} style={{gridTemplateColumns:`repeat(${cols},1fr)`}}>
        {order.filter(id=>widgets[id]).map(id=>widgets[id])}
      </div>

      <footer className="foot"><span className="subro">Tiles brighten as you finish them · saved automatically in this browser · best in landscape</span></footer>
    </div>
  );
}

/* inputs */
function GoalInput({onAdd}){ const [v,setV]=useState(""); const s=()=>{ const t=v.trim(); if(t){ onAdd(t); setV(""); } }; return <div className="addrow"><input className="addinput" placeholder="Add a goal for today…" value={v} onChange={e=>setV(e.target.value)} onKeyDown={e=>e.key==="Enter"&&s()} /><button className="addbtn" onClick={s}>+</button></div>; }
function TodoInput({onAdd}){ const [v,setV]=useState(""); const s=()=>{ const t=v.trim(); if(t){ onAdd(t); setV(""); } }; return <div className="addrow"><input className="addinput" placeholder="Add a task…" value={v} onChange={e=>setV(e.target.value)} onKeyDown={e=>e.key==="Enter"&&s()} /><button className="addbtn" onClick={s}>+</button></div>; }
function HabitInput({onAdd}){ const [v,setV]=useState(""); const s=()=>{ const t=v.trim(); if(t){ onAdd(t); setV(""); } }; return <div className="addrow"><input className="addinput" placeholder="Add a habit…" value={v} onChange={e=>setV(e.target.value)} onKeyDown={e=>e.key==="Enter"&&s()} /><button className="addbtn" onClick={s}>+</button></div>; }
function EventInput({onAdd}){ const [title,setTitle]=useState(""); const [date,setDate]=useState(""); const [time,setTime]=useState("");
  const s=()=>{ if(title.trim()&&date){ onAdd({title:title.trim(),date,time}); setTitle(""); setDate(""); setTime(""); } };
  return (<div style={{display:"flex",flexDirection:"column",gap:6}}>
    <div className="addrow"><input className="addinput" placeholder="Event…" value={title} onChange={e=>setTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&s()} /></div>
    <div className="addrow"><input className="addinput" type="date" value={date} onChange={e=>setDate(e.target.value)} /><input className="addinput" type="time" style={{flex:"none",width:92}} value={time} onChange={e=>setTime(e.target.value)} /><button className="addbtn" onClick={s}>+</button></div>
  </div>); }
function BirthdayInput({onAdd}){ const [name,setName]=useState(""); const [day,setDay]=useState(""); const [month,setMonth]=useState("");
  const s=()=>{ const d=Number(day),m=Number(month); if(name.trim()&&d>=1&&d<=31&&m>=1&&m<=12){ onAdd({name:name.trim(),day:d,month:m}); setName(""); setDay(""); setMonth(""); } };
  return (<div className="addrow"><input className="addinput" style={{flex:2}} placeholder="Name" value={name} onChange={e=>setName(e.target.value)} /><input className="addinput" style={{width:42,flex:"none",textAlign:"center"}} placeholder="DD" value={day} onChange={e=>setDay(e.target.value.replace(/\D/g,"").slice(0,2))} /><input className="addinput" style={{width:42,flex:"none",textAlign:"center"}} placeholder="MM" value={month} onChange={e=>setMonth(e.target.value.replace(/\D/g,"").slice(0,2))} onKeyDown={e=>e.key==="Enter"&&s()} /><button className="addbtn" onClick={s}>+</button></div>); }

function LineChart({values}){
  const W=300,H=84,P=9, n=values.length, max=Math.max(...values,1);
  const x=i=> P + (n<=1?0:(i*(W-2*P)/(n-1)));
  const y=v=> (H-P) - (v/max)*(H-2*P);
  const pts=values.map((v,i)=>`${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block",marginTop:6}}>
      <line x1={P} y1={H-P} x2={W-P} y2={H-P} stroke="var(--hair)" strokeWidth="1"/>
      <polyline points={pts} fill="none" stroke="var(--lbl)" strokeWidth="2.4" strokeLinejoin="round" strokeLinecap="round"/>
      {values.map((v,i)=>(<circle key={i} cx={x(i)} cy={y(v)} r={v>0?2.6:1.5} fill="var(--lbl)"/>))}
    </svg>
  );
}
function nextBirthday(list){
  if(!list.length) return null;
  const now=new Date(); const base=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  let best=null,bd=99999;
  list.forEach(b=>{ let d=new Date(now.getFullYear(),b.month-1,b.day); if(d<base) d=new Date(now.getFullYear()+1,b.month-1,b.day);
    const days=Math.round((d-base)/86400000); if(days<bd){ bd=days; best={...b,days}; } });
  return best;
}
function BirthdaysCard({birthdays,today,onAdd,onRemove,onImport}){
  const [open,setOpen]=useState(false);
  const fileRef=useRef(null);
  const has=today.length>0; const next=nextBirthday(birthdays);
  if(!open) return (
    <div>
      {has ? (<div>
        <div style={{fontSize:30,lineHeight:1}}>🎂</div>
        <div style={{fontSize:18,fontWeight:800,marginTop:6,lineHeight:1.15}}>{today.map(b=>b.name).join(", ")}</div>
        <div className="muted" style={{fontSize:12.5,marginTop:3}}>Birthday today — send a message.</div>
      </div>) : (<div>
        <div style={{fontSize:15,fontWeight:700}}>No birthdays today</div>
        {next && <div className="muted" style={{fontSize:12.5,marginTop:4}}>Next: {next.name} · {pad(next.day)}/{pad(next.month)} · {next.days===0?"today":next.days===1?"tomorrow":"in "+next.days+" days"}</div>}
      </div>)}
      <button className="link" style={{marginTop:12}} onClick={()=>setOpen(true)}>All birthdays & import →</button>
    </div>
  );
  return (
    <div>
      <div style={{display:"flex",gap:7,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
        <button className="pill" onClick={()=>fileRef.current&&fileRef.current.click()}>↧ Import (.vcf)</button>
        <button className="link" onClick={()=>setOpen(false)}>Done</button>
        <input ref={fileRef} type="file" accept=".vcf,text/vcard,text/directory" style={{display:"none"}} onChange={e=>{ onImport(e.target.files&&e.target.files[0]); e.target.value=""; }} />
      </div>
      <BirthdayInput onAdd={onAdd} />
      <div style={{marginTop:5}}>
        {birthdays.length===0 && <Note>Import your contacts, or add people by hand.</Note>}
        {[...birthdays].sort((a,b)=>a.month-b.month||a.day-b.day).map(b=>(<div key={b.id} className="trow">
          <span style={{flex:1,fontSize:13.5,display:"flex",alignItems:"center",gap:6}}>{b.name}{b.source && <span className="gbadge">sync</span>}</span>
          <span className="muted" style={{fontSize:11.5,fontFamily:"'Space Mono',monospace"}}>{pad(b.day)}/{pad(b.month)}</span>
          <button className="del" onClick={()=>onRemove(b.id)}>×</button>
        </div>))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
